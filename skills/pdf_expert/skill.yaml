name: "pdf_expert"
version: "1.0.0"
author: "proSec"
description: "PDF 文档解析与处理技能"
tags: ["pdf", "document", "extraction"]

instructions: |
  你是 PDF 文档处理专家。当用户需要读取、解析或提取 PDF 内容时，使用本技能：
  1. 先用 read_pdf_text 提取文本内容
  2. 如果用户要求表格数据，再尝试提取表格
  3. 汇总结果后返回给用户

tools:
  - name: read_pdf_text
    description: "提取 PDF 文件中的纯文本内容，支持指定页码范围"
    parameters:
      type: object
      properties:
        file_path:
          type: string
          description: "PDF 文件路径（相对于工作目录）"
        start_page:
          type: integer
          description: "起始页码（从1开始，可选，默认1）"
        end_page:
          type: integer
          description: "结束页码（可选，默认最后一页）"
      required: ["file_path"]

dependencies:
  python: ["pypdf>=5.0.0"]